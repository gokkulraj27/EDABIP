spring.application.name=edabip

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/edabip?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=edabip-super-secret-key-2024-for-hmac-sha256-must-be-at-least-256-bits-long-secure
jwt.expiration=86400000

# Server
server.port=8080

# Logging
logging.level.com.edabip=DEBUG
logging.level.org.springframework.security=INFO
